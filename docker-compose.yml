services:
  api:
    build: ./apps/api
    ports:
      - "8100:8100"
    env_file:
      - ./apps/api/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: ./apps/web
    ports:
      - "3100:3100"
    env_file:
      - ./apps/web/.env.local
    depends_on:
      api:
        condition: service_healthy
