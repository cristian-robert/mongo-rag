services:
  api:
    build: ./apps/api
    ports:
      - "8100:8100"
    env_file:
      - ./apps/api/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build: ./apps/web
    ports:
      - "3100:3100"
    env_file:
      - ./apps/web/.env
    depends_on:
      api:
        condition: service_healthy
