# Hybrid local dev: only redis + celery worker run in docker.
# api (FastAPI) and web (Next.js) run on the host via scripts/dev.sh.
# Use:   docker compose -f docker-compose.dev.yml up -d
# Worker reuses the mongorag-api:dev image. Rebuild after celery-task
# code changes:  docker compose -f docker-compose.dev.yml build worker

services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: mongorag-api:dev
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      # The Dockerfile sets ENTRYPOINT=entrypoint.sh, which dispatches on
      # PROCESS_TYPE (default "api" → uvicorn). Override to launch celery.
      # `command:` would be ignored — the entrypoint script doesn't read $@.
      PROCESS_TYPE: worker
      # Worker stays on the docker network — talks to redis by service name.
      REDIS_URL: redis://redis:6379/0
      # BlobStore: filesystem mode shares uploads with the host API via
      # an identical absolute path on host and container, so file:// URIs
      # produced by the API resolve verbatim inside the worker.
      BLOB_STORE: fs
      # The host API embeds an absolute file:// URI in the Celery payload.
      # The worker resolves that URI verbatim, so the same absolute path
      # must exist (and contain the same bytes) inside the container.
      # Using a path under the repo root keeps it inside the macOS
      # docker VM's default $HOME share (Colima/OrbStack/Rancher), which
      # is not the case for /tmp or /private/tmp. Must match
      # apps/api/.env:UPLOAD_TEMP_DIR.
      UPLOAD_TEMP_DIR: /Users/cristian-robertiosef/Desktop/Dev/mongo-rag/.tmp/uploads
    volumes:
      - ./.tmp/uploads:/Users/cristian-robertiosef/Desktop/Dev/mongo-rag/.tmp/uploads:rw
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
