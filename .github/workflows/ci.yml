name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Python Backend ─────────────────────────────────────────────
  api-lint:
    name: "API: Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  api-typecheck:
    name: "API: Type Check"
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error once existing mypy errors are resolved
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run mypy src/ --ignore-missing-imports

  api-test:
    name: "API: Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run pytest -m unit --tb=short -q

  api-integration:
    name: "API: Integration Tests"
    runs-on: ubuntu-latest
    # Only runs when explicitly dispatched. Requires MONGODB_TEST_URI to be
    # provisioned as a repository secret pointing at a throwaway database.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      MONGODB_TEST_URI: mongodb://localhost:27017
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run pytest -m integration --tb=short -q

  # ─── Next.js Frontend ──────────────────────────────────────────
  web-lint:
    name: "Web: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  web-typecheck:
    name: "Web: Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit

  web-build:
    name: "Web: Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  web-test:
    name: "Web: Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # ─── End-to-End ────────────────────────────────────────────────
  e2e:
    name: "E2E: Playwright"
    runs-on: ubuntu-latest
    # Opt-in only: dispatched manually with run_e2e=true. Requires the local
    # stack (docker compose) to be reachable; we skip otherwise to keep PRs
    # green while infra is still landing.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e }}
    defaults:
      run:
        working-directory: e2e
    env:
      E2E: "1"
      WEB_BASE_URL: http://localhost:3100
      API_BASE_URL: http://localhost:8100
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start application stack
        run: docker compose up -d --wait
        working-directory: ${{ github.workspace }}

      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test

      - name: Tear down stack
        if: always()
        run: docker compose down -v
        working-directory: ${{ github.workspace }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  # ─── Docker Build Smoke Test ───────────────────────────────────
  docker-build:
    name: "Docker: Build Images"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - name: api
            context: ./apps/api
          - name: web
            context: ./apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          load: true
          tags: mongorag-${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min
