name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Python Backend ─────────────────────────────────────────────
  api-lint:
    name: "API: Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  api-typecheck:
    name: "API: Type Check"
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error once existing mypy errors are resolved
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run mypy src/ --ignore-missing-imports

  api-test:
    name: "API: Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --dev
      - run: uv run pytest -m unit --tb=short -q

  # ─── Next.js Frontend ──────────────────────────────────────────
  web-lint:
    name: "Web: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  web-typecheck:
    name: "Web: Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit

  web-build:
    name: "Web: Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ─── Docker Build Smoke Test ───────────────────────────────────
  docker-build:
    name: "Docker: Build Images"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - name: api
            context: ./apps/api
          - name: web
            context: ./apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          load: true
          tags: mongorag-${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min
